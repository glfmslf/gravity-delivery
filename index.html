<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>反重力快递</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <span class="hud-label">时间</span>
          <strong id="time-value">60.0</strong>
        </div>
        <div>
          <span class="hud-label">进度</span>
          <strong id="progress-value">0%</strong>
        </div>
        <div>
          <span class="hud-label">连击</span>
          <strong id="combo-value">0</strong>
        </div>
        <div class="hud-actions">
          <button id="audio-button" type="button" aria-pressed="false">声音开</button>
          <button id="restart-button" type="button">重开</button>
        </div>
      </section>

      <canvas id="game-canvas" width="960" height="540" aria-label="反重力快递游戏画布"></canvas>

      <button id="control-button" class="control-button" type="button">开始 / 翻转</button>

      <section class="status-panel" aria-live="polite">
        <h1>反重力快递</h1>
        <p id="status-text">按空格或 Enter 开始配送。</p>
      </section>

      <section class="leaderboard" aria-label="本机排行榜">
        <h2>本机排行榜</h2>
        <ol id="leaderboard-list">
          <li>暂无通关记录</li>
        </ol>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
